<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>สรุปผลการออกกำลังกาย</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Page-specific overrides */
    :root {
      --primary-color: #0F766E;
      --primary-light: #14B8A6;
      --secondary-color: #F59E0B;
      --bg-color: #F9FAFB;
      --text-primary: #1F2937;
      --text-secondary: #6B7280;
      --white: #FFFFFF;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }

    body {
      background: var(--bg-color);
      font-family: 'Sarabun', sans-serif;
      color: var(--text-primary);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Center horizontally and vertically */
    }

    .container-inner {
      width: 100%;
      max-width: 600px;
      padding: 24px;
      box-sizing: border-box;
    }

    .modal-card {
      background: var(--white);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    /* Centered Header Styles */
    .modal-header-centered {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .title-large {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      line-height: 1.2;
      width: 100%;
      white-space: nowrap;
      /* Prevent wrapping */
    }

    @media (max-width: 400px) {
      .title-large {
        font-size: 20px;
        white-space: normal;
        /* Allow wrap on tiny screens */
      }
    }

    .success-icon {
      color: #14B8A6;
      font-size: 24px;
    }

    .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .date-badge-centered {
      background: #F3F4F6;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .summary-divider {
      height: 1px;
      background: #E5E7EB;
      margin-bottom: 24px;
      width: 100%;
    }

    .summary-stats-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
      text-align: left;
    }

    .summary-stat-box {
      background: #F9FAFB;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #F3F4F6;
    }

    .summary-stat-box.highlight {
      background: #F0FDFA;
      border-color: #CCFBF1;
    }

    .stat-icon-wrapper {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 14px;
      flex-shrink: 0;
    }

    .stat-icon-wrapper.left {
      background: #E0E7FF;
      color: #4F46E5;
    }

    .stat-icon-wrapper.right {
      background: #ECFDF5;
      color: #059669;
    }

    .stat-icon-wrapper.round {
      background: #FEF3C7;
      color: #D97706;
    }

    .stat-icon-wrapper.total {
      background: #CCFBF1;
      color: #0F766E;
      font-size: 16px;
    }

    .stat-content {
      flex: 1;
      min-width: 0;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .stat-unit {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Light duration box */
    .summary-duration-box.light {
      background: #F3F4F6;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      color: var(--text-primary);
      margin-bottom: 24px;
      border: 1px solid #E5E7EB;
      box-shadow: none;
    }

    .summary-duration-box.light .duration-label {
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      opacity: 1;
    }

    .summary-duration-box.light .duration-value {
      color: var(--primary-color);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .actions-row {
      display: flex;
      gap: 12px;
    }

    .action-button {
      flex: 1;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .action-button.primary {
      background: var(--primary-color);
      color: white;
      box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
    }

    .action-button.primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
    }

    .action-button.danger {
      background: white;
      color: #DC2626;
      border: 1px solid #FEE2E2;
    }

    .action-button.danger:hover {
      background: #FEE2E2;
    }

    @media (max-width: 480px) {
      .summary-stats-container {
        grid-template-columns: 1fr;
      }

      .actions-row {
        flex-direction: row;
      }
    }
  </style>
</head>

<body>
  <div class="container-inner">
    <div id="summaryRoot">
      <div class="modal-card">
        <div class="modal-header-centered">
          <div class="title-large">
            <i class="fas fa-check-circle success-icon"></i>
            สรุปผลการออกกำลังกาย
          </div>
          <div class="subtitle">ท่ายกดัมเบล (ยืน)</div>
          <div class="date-badge-centered">
            <i class="far fa-calendar-alt"></i> <span id="summary-date">-</span>
          </div>
        </div>

        <div class="summary-divider"></div>

        <div class="summary-stats-container">
          <div class="summary-stat-box">
            <div class="stat-icon-wrapper left">L</div>
            <div class="stat-content">
              <div class="stat-label">ข้างซ้าย</div>
              <div id="summary-left" class="stat-value">0</div>
              <div class="stat-unit">ครั้ง</div>
            </div>
          </div>

          <div class="summary-stat-box">
            <div class="stat-icon-wrapper right">R</div>
            <div class="stat-content">
              <div class="stat-label">ข้างขวา</div>
              <div id="summary-right" class="stat-value">0</div>
              <div class="stat-unit">ครั้ง</div>
            </div>
          </div>

          <div class="summary-stat-box">
            <div class="stat-icon-wrapper round"><i class="fas fa-sync-alt"></i></div>
            <div class="stat-content">
              <div class="stat-label">จำนวนรอบ</div>
              <div id="summary-rounds" class="stat-value">0</div>
              <div class="stat-unit">รอบ</div>
            </div>
          </div>

          <div class="summary-stat-box highlight">
            <div class="stat-icon-wrapper total"><i class="fas fa-dumbbell"></i></div>
            <div class="stat-content">
              <div class="stat-label">รวมทั้งหมด</div>
              <div id="summary-total" class="stat-value">0</div>
              <div class="stat-unit">ครั้ง</div>
            </div>
          </div>
        </div>

        <div class="summary-duration-box light">
          <div class="duration-label">ระยะเวลาทั้งหมด</div>
          <div id="summary-duration" class="duration-value">0:00</div>
        </div>

        <div class="actions-row">
          <button id="clearSummary" class="action-button danger">
            <i class="fas fa-times"></i> ปิด
          </button>
          <button id="downloadCsv" class="action-button primary">
            <i class="fas fa-save"></i> บันทึกข้อมูล
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    function formatDuration(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    const raw = localStorage.getItem('lastSummary');
    let summary = null;
    if (raw) {
      try { summary = JSON.parse(raw); } catch (e) { console.warn(e); }
    }

    if (!summary) {
      // no summary found
      document.getElementById('summary-left').textContent = '-';
      document.getElementById('summary-right').textContent = '-';
      document.getElementById('summary-rounds').textContent = '-';
      document.getElementById('summary-total').textContent = '-';
      document.getElementById('summary-duration').textContent = '-';
      document.getElementById('summary-date').textContent = '-';
    } else {
      document.getElementById('summary-left').textContent = summary.left;
      document.getElementById('summary-right').textContent = summary.right;
      document.getElementById('summary-rounds').textContent = summary.rounds;
      document.getElementById('summary-total').textContent = summary.total;
      document.getElementById('summary-duration').textContent = formatDuration(summary.durationSec || 0);
      document.getElementById('summary-date').textContent = summary.date || '-';
    }

    document.getElementById('downloadCsv').textContent = 'บันทึกข้อมูล';
    document.getElementById('downloadCsv').id = 'saveData';

    document.getElementById('saveData').addEventListener('click', () => {
      if (!summary) return alert('ไม่พบข้อมูลสรุปผล');

      // ส่งข้อมูลไปยัง Flutter
      if (window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('saveExerciseData', summary).then(function (result) {
          console.log("Save result: " + result);
        });
      } else {
        // Fallback or debug for browser testing
        console.log("Flutter WebView not detected. Data to save:", summary);
        alert("บันทึกข้อมูล (Simulation): " + JSON.stringify(summary));
      }
    });

    document.getElementById('clearSummary').addEventListener('click', () => {
      localStorage.removeItem('lastSummary');
      // Navigate close properly or redirect
      if (window.flutter_inappwebview) {
        // You might want to close webview or go back
        console.log("Closing summary");
        // Here we just redirect to index as standard fallback
        window.location.href = 'index.html';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>

</html>
